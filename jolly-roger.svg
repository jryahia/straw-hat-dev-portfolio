<svg viewBox="0 0 100 100" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
    <!-- Skull -->
    <circle cx="50" cy="45" r="25" fill="#fef3c7" stroke="#0a0806" stroke-width="2"/>
    <!-- Left Eye -->
    <circle cx="42" cy="42" r="4" fill="#0a0806"/>
    <!-- Right Eye -->
    <circle cx="58" cy="42" r="4" fill="#0a0806"/>
    <!-- Nose -->
    <path d="M48 48 L50 52 L52 48 Z" fill="#0a0806"/>
    <!-- Mouth -->
    <path d="M40 54 Q50 58 60 54" stroke="#0a0806" stroke-width="2" fill="none"/>
    <!-- Straw Hat Brim -->
    <ellipse cx="50" cy="28" rx="28" ry="8" fill="#f59e0b" stroke="#0a0806" stroke-width="2"/>
    <!-- Hat Top -->
    <rect x="22" y="24" width="56" height="8" fill="#f59e0b" stroke="#0a0806" stroke-width="2"/>
    <!-- Red Band -->
    <rect x="48" y="20" width="4" height="12" fill="#dc2626"/>
    <!-- Left Crossbone -->
    <g transform="rotate(-45 35 70)">
        <rect x="30" y="68" width="10" height="4" rx="2" fill="#fef3c7" stroke="#0a0806" stroke-width="1"/>
        <circle cx="29" cy="70" r="3" fill="#fef3c7" stroke="#0a0806" stroke-width="1"/>
        <circle cx="41" cy="70" r="3" fill="#fef3c7" stroke="#0a0806" stroke-width="1"/>
    </g>
    <!-- Right Crossbone -->
    <g transform="rotate(45 65 70)">
        <rect x="60" y="68" width="10" height="4" rx="2" fill="#fef3c7" stroke="#0a0806" stroke-width="1"/>
        <circle cx="59" cy="70" r="3" fill="#fef3c7" stroke="#0a0806" stroke-width="1"/>
        <circle cx="71" cy="70" r="3" fill="#fef3c7" stroke="#0a0806" stroke-width="1"/>
    </g>
</svg>
